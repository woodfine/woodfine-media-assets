# Woodfine Management Corp. - Brand Typography Tokens
# Standard: Offline Print & PDF Disclosure Generation Only
# Compliance: 100% SIL Open Font License (OFL)
# Boundary: Web UI strictly utilizes System Fonts per DS-ADR-07.

typography_brand:
  serif_primary:
    family: "Zilla Slab"
    variants: ["Light", "Regular", "Medium", "SemiBold", "Bold"]
    usage: "Formal document headers, legal blocks, and institutional covers. (Primary Caecilia Replacement)"
  
  sans_condensed:
    family: "Barlow Condensed"
    variants: ["Regular", "Medium", "SemiBold", "Bold"]
    usage: "Data tables, financial ledger headers, and high-density technical specs. (Primary Trade Gothic Replacement)"
  
  sans_primary:
    family: "Nunito Sans"
    variants: ["Light", "Regular", "SemiBold", "Bold"]
    usage: "Primary body copy for PDF white papers and corporate memos. (Primary Avenir Replacement)"
    
  serif_secondary:
    family: "Sahitya"
    variants: ["Regular", "Bold"]
    usage: "Fallback or secondary editorial serif."
